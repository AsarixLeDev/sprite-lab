<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="color-scheme" content="light dark"><title>Authenticate · Sprite Lab</title><link rel="stylesheet" href="{{ request.url_for('product-static', path='app.css') }}"></head><body class="auth-body"><main class="auth-card"><span class="brand-mark" aria-hidden="true">S</span><span class="eyebrow">{{ project_name }}</span><h1>Open Sprite Lab</h1><p>This server is available beyond the local computer. Enter the runtime token supplied when it started.</p>{% if auth_error %}<div class="warning-banner" role="alert">{{ auth_error }}</div>{% endif %}<form method="post" action="/auth"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label for="auth-token">Authentication token</label><input id="auth-token" name="token" type="password" required autocomplete="current-password"><button class="button primary" type="submit">Authenticate</button></form><small>The token is kept in this browser session and is not stored in project configuration.</small></main></body></html>
