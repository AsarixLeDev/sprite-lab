name: CI

on:
  push:
    branches: [main, v1, "v1.*", v2, v3]
  pull_request:
    branches: [main, v2, v3]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint deps
        run: pip install ruff==0.15.20 mypy==2.2.0
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy src

  test:
    name: test (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install CPU PyTorch (Linux)
        if: runner.os == 'Linux'
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install CPU PyTorch (Windows)
        if: runner.os == 'Windows'
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install package + extras
        run: pip install -e ".[dev,ml,harvest,prefill]"
      - name: Verify torch import
        run: python -c "import torch; print(f'torch {torch.__version__}, cuda={torch.cuda.is_available()}')"
      - name: Run tests
        run: python -m pytest -q -ra --basetemp=.pytest_tmp_ci -p no:cacheprovider
